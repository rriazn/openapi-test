name: OpenAPI Test Pipeline

on:
  push:
    branches:
      - main
    tags:
      - '*.*.*'
  pull_request:
    branches:
      - main

jobs:
  checkout-git-tag:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag_check.outputs.tag }}
      unique_tag: ${{ steps.tag_check.outputs.unique_tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check tag on triggering commit
        id: tag_check
        shell: bash
        run: |
          git fetch --force --tags

          # For push events this is the pushed commit; for PRs this is the workflow SHA.
          SHA="${GITHUB_SHA}"
          SHORT_SHA="${GITHUB_SHA::7}"

          TAG="$(git tag --points-at "$SHA" | head -n 1)"

          if [ -n "$TAG" ]; then
            echo "Version: $TAG"
            echo "tag=$TAG" >> "$GITHUB_OUTPUT"
            echo "unique_tag=${TAG}-${GITHUB_RUN_NUMBER}.${GITHUB_RUN_ATTEMPT}-${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          else
            echo "Version: latest"
            echo "tag=" >> "$GITHUB_OUTPUT"
            echo "unique_tag=latest-${GITHUB_RUN_NUMBER}.${GITHUB_RUN_ATTEMPT}-${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          fi
  build-and-push-images:
    needs: checkout-git-tag
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v1

      - name: Log in to Docker Hub
        uses: docker/login-action@v1
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Development test image
        uses: docker/build-push-action@v2
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/openapi-test:${{ needs.checkout-git-tag.outputs.unique_tag }}-development
      - name: Build and push Integration test image
        uses: docker/build-push-action@v2
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/openapi-test:${{ needs.checkout-git-tag.outputs.unique_tag }}-integration
      - name: Build and push Production test image
        uses: docker/build-push-action@v2
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/openapi-test:${{ needs.checkout-git-tag.outputs.unique_tag }}-production
      - name: Build and push production deploy image
        if: needs.checkout-git-tag.outputs.tag != ''
        uses: docker/build-push-action@v2
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/openapi-test:${{ needs.checkout-git-tag.outputs.tag }}
  
  run-tests:
    needs: 
      - checkout-git-tag
      - build-and-push-images
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v1
      - name: Log in to Docker Hub
        uses: docker/login-action@v1
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Run Unit tests
        shell: bash
        run: |
          export TEST_COMMAND="pytest tests/unit"
          docker pull ${{ secrets.DOCKER_USERNAME }}/openapi-test:${{ needs.checkout-git-tag.outputs.unique_tag }}-development
          cd compose/development
          docker-compose -f docker-compose.yaml run --rm test-runner
      - name: Run API tests
        shell: bash
        run: |
          export TEST_COMMAND="pytest tests/api"
          docker pull ${{ secrets.DOCKER_USERNAME }}/openapi-test:${{ needs.checkout-git-tag.outputs.unique_tag }}-development
          cd compose/development
          docker-compose -f docker-compose.yaml run --rm test-runner
      - name: Run Integration tests
        shell: bash
        run: |
          ./scripts/run-integration-tests.sh --production-image ${{ secrets.DOCKER_USERNAME }}/openapi-test:${{ needs.checkout-git-tag.outputs.unique_tag }}-production \
          --test-image ${{ secrets.DOCKER_USERNAME }}/openapi-test:${{ needs.checkout-git-tag.outputs.unique_tag }}-integration